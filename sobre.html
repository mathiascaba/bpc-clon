<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Información - BCP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bcp-blue: #002A8D;
            --bcp-orange: #FF7800;
            --bg-gray: #f4f6f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }

        body {
            background-color: var(--bg-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        /* Cabecera estilo BCP */
        .top-header {
            width: 100%;
            height: 60px;
            background-color: var(--bcp-blue);
            border-bottom: 4px solid var(--bcp-orange);
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: relative;
            z-index: 10;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 20px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            color: white;
            font-size: 18px;
            font-weight: 500;
            margin-left: 10px;
        }

        /* Contenedor Principal */
        .info-card {
            background: white;
            width: 90%;
            max-width: 360px;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            text-align: center;
            margin-top: 40px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .info-logo {
            width: 60px;
            height: 60px;
            background-color: var(--bcp-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 10px rgba(0, 42, 141, 0.3);
        }

        h1 { color: var(--bcp-blue); font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 25px; }

        /* Lista de detalles */
        .details-list {
            text-align: left;
            margin-bottom: 30px;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .detail-item:last-child { border-bottom: none; }
        .detail-label { color: #666; font-weight: 500; }
        .detail-value { color: #333; font-weight: 700; text-align: right; }

        /* Botones BCP */
        .btn-bcp {
            background-color: var(--bcp-orange);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 15px;
            transition: transform 0.1s;
        }

        .btn-bcp:active { transform: scale(0.97); }

        .btn-blue {
            background-color: var(--bcp-blue);
        }
    </style>
</head>
<body>

    <div class="top-header">
        <a href="opciones.html" class="back-btn">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <div class="header-title">Información de la App</div>
    </div>

    <div class="info-card">
        <div class="info-logo">
            <i class="fa-solid fa-mobile-screen"></i>
        </div>
        
        <h1>BECHEPE V1.0</h1>
        <div class="subtitle">AppsReborn-BCEPE</div>

        <div class="details-list">
            <div class="detail-item">
                <span class="detail-label">Versión</span>
                <span class="detail-value">1.0 (Premium Access)</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Última Actualización</span>
                <span class="detail-value">07/03/2026</span>
            </div>
        </div>

        <a href="https://t.me/Mathi_Dev" class="btn-bcp" target="_blank">
            <i class="fa-solid fa-code"></i> Desarrollador  @Mathi_Dev
        </a>
        
        <a href="https://t.me/appspremiumv1" class="btn-bcp btn-blue" target="_blank">
            <i class="fa-brands fa-telegram"></i> Grupo Oficial  https://t.me/appspremiumv1
        </a>
    </div>

</body>
</html>
