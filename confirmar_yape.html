<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confirmar</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #fff; color: #333; display: flex; flex-direction: column; height: 100vh; }

        /* --- PANTALLA DE CARGA AZUL --- */
        #blue-loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #002a80; /* Azul BCP */
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .processing-loader-container { position: relative; width: 90px; height: 90px; display: flex; justify-content: center; align-items: center; margin-bottom: 30px; }
        .processing-track { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 5px solid rgba(0, 0, 0, 0.2); box-sizing: border-box; }
        .processing-spinner { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 5px solid transparent; border-top-color: #ff7800; box-sizing: border-box; animation: spin 1s linear infinite; }
        .processing-icon { width: 45px; height: 45px; z-index: 2; }
        .processing-text { color: white; font-size: 18px; font-weight: 400; letter-spacing: 0.5px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* HEADER */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background-color: #fff; border-bottom: 1px solid #e0e0e0; }
        .header-title { font-size: 24px; font-weight: 400; color: #444; flex-grow: 1; margin-left: 15px; }
        .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; display: flex; align-items: center; }
        .icon-btn svg { width: 30px; height: 30px; fill: #444; }

        /* CONTENT */
        .main-content { padding: 20px 25px; flex-grow: 1; display: flex; flex-direction: column; }

        /* MONTO */
        .amount-display { text-align: center; margin-top: 25px; margin-bottom: 45px; }
        .amount-value { font-size: 56px; color: #002a80; font-weight: 500; margin: 0; line-height: 1; }
        .amount-label { font-size: 19px; color: #888; margin-top: 8px; font-weight: 300; }

        /* DETALLES */
        .details-list { width: 100%; margin-bottom: 20px; }
        .detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 22px 0; border-bottom: 1px solid #eee; }
        .detail-row:last-child { border-bottom: none; margin-bottom: 10px; }
        
        .detail-label { font-size: 19px; color: #000; font-weight: 400; width: 35%; }
        .detail-value { text-align: right; width: 65%; font-size: 19px; color: #000; }
        
        .detail-value strong { display: block; font-weight: 600; font-size: 19px; margin-bottom: 5px; }
        .detail-value span { display: block; font-size: 17px; color: #666; margin-bottom: 3px; }

        /* INPUT DESC */
        .description-container { margin-top: 5px; }
        .description-input { width: 100%; padding: 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; font-family: inherit; box-sizing: border-box; color: #333; outline: none; }
        .description-input::placeholder { color: #888; }
        .char-counter { text-align: right; font-size: 15px; color: #888; margin-top: 6px; }

        /* BUTTON */
        .footer-container { margin-top: auto; padding-bottom: 25px; text-align: center; }
        .btn-confirmar { width: 100%; background-color: #ff7800; color: white; border: none; border-radius: 40px; padding: 18px 0; font-size: 22px; font-weight: 500; cursor: pointer; }
        .btn-confirmar:active { background-color: #e06900; }
    </style>
</head>
<body>

    <div id="blue-loader-screen">
        <div class="processing-loader-container">
            <div class="processing-track"></div>
            <div class="processing-spinner"></div>
            <img src="img/lg_favicon_white.svg" alt="Icono" class="processing-icon">
        </div>
        <div class="processing-text">Procesando tu solicitud...</div>
    </div>

    <header class="header">
        <button class="icon-btn" onclick="window.history.back()">
            <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" /></svg>
        </button>
        <div class="header-title">Confirmar</div>
        <button class="icon-btn" onclick="window.location.href='inicio.html'">
            <svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" /></svg>
        </button>
    </header>

    <div class="main-content">
        <div class="amount-display">
            <div class="amount-value" id="displayMonto">S/ 0.00</div>
            <div class="amount-label">Monto total</div>
        </div>

        <div class="details-list">
            <div class="detail-row">
                <div class="detail-label">Enviado a</div>
                <div class="detail-value">
                    <strong id="displayNombre">Nombre recuperado</strong>
                    <span id="displayEntidad">Yape</span> </div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Desde</div>
                <div class="detail-value">
                    <strong>Cuenta Digital Soles</strong>
                    <span>7809</span>
                </div>
            </div>
        </div>

        <div class="description-container">
            <input type="text" class="description-input" id="descInput" placeholder="Descripción del pago (Opcional)" maxlength="100">
            <div class="char-counter" id="charCounter">0 / 100</div>
        </div>

        <div class="footer-container">
            <button class="btn-confirmar" onclick="finalizarOperacion()">Confirmar</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const monto = localStorage.getItem('v_monto_yape') || "0.00";
            const nombre = localStorage.getItem('v_nombre_yape') || "Contacto";
            // Jalar la entidad real elegida
            const entidad = localStorage.getItem('v_entidad_destino') || "Yape";

            let montoFormateado = parseFloat(monto).toFixed(2);

            document.getElementById('displayMonto').innerText = "S/ " + montoFormateado;
            document.getElementById('displayNombre').innerText = nombre;
            // Mostrar la entidad real (Agora, Bim, Oh, etc.)
            document.getElementById('displayEntidad').innerText = entidad;

            const inputDesc = document.getElementById('descInput');
            const counter = document.getElementById('charCounter');
            inputDesc.addEventListener('input', function() {
                counter.innerText = this.value.length + " / 100";
            });
        });

        function finalizarOperacion() {
            // --- LÓGICA DE SALDO ---
            const saldoActual = localStorage.getItem("userBalance") || "1200.00";
            const montoYapeado = localStorage.getItem('v_monto_yape') || "0.00";
            
            const saldoNumerico = parseFloat(saldoActual.replace(/,/g, ''));
            const montoNumerico = parseFloat(montoYapeado);
            
            let nuevoSaldo = saldoNumerico - montoNumerico;
            if (nuevoSaldo < 0) nuevoSaldo = 0;
            
            localStorage.setItem("userBalance", nuevoSaldo.toFixed(2));

            // Generar fecha y hora para el registro
            const ahora = new Date();
            const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            let fechaTexto = ahora.toLocaleDateString('es-ES', opcionesFecha);
            
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            const ampm = horas >= 12 ? 'p.m.' : 'a.m.';
            horas = horas % 12;
            horas = horas ? horas : 12;
            minutos = minutos < 10 ? '0'+minutos : minutos;
            const horaTexto = horas + ':' + minutos + ' ' + ampm;

            let fechaFinal = fechaTexto + " - " + horaTexto;
            fechaFinal = fechaFinal.charAt(0).toUpperCase() + fechaFinal.slice(1);

            localStorage.setItem('v_fecha_yape', fechaFinal);

            // Mostrar pantalla de carga y redirigir
            document.getElementById('blue-loader-screen').style.display = 'flex';

            setTimeout(function() {
                window.location.href = 'exito_yape.html';
            }, 3000);
        }
    </script>
</body>
</html>
