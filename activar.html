<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Activar App</title>
    <link rel="icon" href="img/app-icon.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #002a80; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: system-ui, sans-serif; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 40px 30px; text-align: center; max-width: 380px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .card img { width: 80px; margin-bottom: 20px; }
        .card h1 { color: #002a80; font-size: 22px; margin-bottom: 8px; }
        .card p { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .card input { width: 100%; padding: 14px 16px; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; text-transform: uppercase; letter-spacing: 2px; outline: none; font-family: monospace; }
        .card input:focus { border-color: #ff7800; }
        .card button { width: 100%; padding: 14px; background: #ff7800; color: white; border: none; border-radius: 25px; font-size: 16px; font-weight: 700; margin-top: 15px; cursor: pointer; }
        .card button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error { color: #d9534f; font-size: 13px; margin-top: 12px; display: none; }
        .loader-mini { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <img src="img/logo-bcp.svg" alt="BCP">
        <h1>Activar Aplicación</h1>
        <p>Ingresá el código de activación que te proporcionaron</p>
        <input type="text" id="codeInput" maxlength="12" placeholder="BCP-XXXXXXXX" autocomplete="off">
        <div class="error" id="errorMsg"></div>
        <button id="btnActivar" onclick="activar()">ACTIVAR</button>
    </div>
    <script>
        function getDeviceId() {
            let id = localStorage.getItem('bcp_device_id')
            if (!id) {
                id = 'DEV-' + crypto.randomUUID()
                localStorage.setItem('bcp_device_id', id)
            }
            return id
        }

        async function activar() {
            const btn = document.getElementById('btnActivar')
            const code = document.getElementById('codeInput').value.trim()
            const errorEl = document.getElementById('errorMsg')

            if (!code) {
                errorEl.textContent = 'Ingresá un código de activación'
                errorEl.style.display = 'block'
                return
            }

            btn.disabled = true
            btn.innerHTML = '<span class="loader-mini"></span> Activando...'
            errorEl.style.display = 'none'

            try {
                const res = await fetch('/.netlify/functions/activate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, deviceId: getDeviceId() })
                })
                const data = await res.json()

                if (data.success) {
                    localStorage.setItem('bcp_activated', 'true')
                    window.location.replace('inicio.html')
                } else {
                    errorEl.textContent = data.error || 'Error al activar'
                    errorEl.style.display = 'block'
                    btn.disabled = false
                    btn.textContent = 'ACTIVAR'
                }
            } catch (e) {
                errorEl.textContent = 'Error de conexión. Verificá que tengas internet.'
                errorEl.style.display = 'block'
                btn.disabled = false
                btn.textContent = 'ACTIVAR'
            }
        }

        document.getElementById('codeInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') activar()
        })
    </script>
</body>
</html>
