<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="app-icon.png">
     <link rel="apple-touch-icon" href="app-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banca Móvil BCP</title>
    <meta name="theme-color" content="#002a80">
    <link rel="manifest" href="manifest.json?v=2">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            outline: none;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #002a80;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- ZONA SUPERIOR --- */
        .top-background {
            background-color: #0050d0;
            background-image: url('img/night-des-remake.svg');
            background-size: cover;
            background-position: bottom center;
            background-repeat: no-repeat;
            height: 35vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin-top: 5px;
        }

        .logo-bcp { height: 34px; width: auto; }
        .top-icons { display: flex; gap: 20px; align-items: center; }
        .top-icon { width: 28px; height: 28px; cursor: pointer; }

        /* --- TARJETA BLANCA --- */
        .main-card {
            background-color: #fff;
            flex-grow: 1;
            width: 100%;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            margin-top: -150px; /* Hoja bien arriba */
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 20px 20px;
            overflow-y: auto;
        }

        .greeting-title { font-size: 30px; font-weight: 600; color: #002a80; margin: 10px 0 5px 0; }
        .greeting-subtitle { font-size: 18px; color: #444; font-weight: 400; margin-bottom: 30px; }

        /* GRID */
        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px 15px;
            width: 100%;
            margin-bottom: 35px;
        }

        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background-color: #ff7800;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            box-shadow: 0 4px 8px rgba(255, 120, 0, 0.25);
        }

        /* FILTRO MÁGICO: Vuelve blancos los iconos negros de internet */
        .icon-circle img {
            width: 32px;
            height: 32px;
            filter: brightness(0) invert(1);
        }

        .icon-circle img.yape-icon-large { width: 42px; height: 42px; }

        .shortcut-label {
            font-size: 15px;
            color: #000;
            line-height: 1.2;
            font-weight: 400;
        }

        /* FORMULARIO */
        .login-form {
            width: 100%;
            max-width: 380px;
            margin-top: auto;
            padding-bottom: 15px;
        }

        .card-selector {
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            background-color: #fff;
        }

        .user-icon-img { width: 40px; height: 40px; margin-right: 12px; border-radius: 50%; }
        .card-info { flex-grow: 1; }
        .card-type { font-size: 17px; font-weight: 600; color: #000; display: block; }
        .card-number { font-size: 16px; color: #666; }

        .password-container {
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            background-color: #fff;
        }

        .password-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 18px;
            font-family: inherit;
            -webkit-text-security: disc; 
        }
        .password-input::placeholder { color: #777; -webkit-text-security: none; font-size: 17px; }
        
        .eye-icon { width: 28px; height: 28px; cursor: pointer; padding: 2px; }

        .btn-ingresar {
            width: 100%;
            background-color: #f2f2f2;
            color: #b0b0b0;
            border: none;
            border-radius: 30px;
            padding: 18px 0;
            font-size: 20px;
            font-weight: 500;
            cursor: default;
            transition: all 0.3s ease;
        }

        .btn-ingresar.active {
            background-color: #ff7800;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 120, 0, 0.3);
        }

        .footer-links { text-align: center; margin-top: 25px; }
        .forgot-pass { color: #ff7800; text-decoration: none; font-weight: 600; font-size: 16px; display: block; }
        .version-text { margin-top: 25px; color: #aaa; font-size: 13px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="top-background">
        <nav class="nav-bar">
            <img src="img/logo-bcp.svg" alt="BCP" class="logo-img" style="height: 30px; object-fit: contain;">
            <div class="top-icons">
                <img src="img/preguntas-icon.svg" alt="Ayuda" class="top-icon">
                <img src="img/llamar-icon.svg" alt="Llamar" class="top-icon">
                <img src="img/menu.svg" alt="Menú" class="top-icon">
            </div>
        </nav>
    </div>

    <div class="main-card">
        
        <h1 class="greeting-title">Hola</h1>
        <p class="greeting-subtitle">¡Qué bueno tenerte por aquí!</p>

        <div class="shortcuts-grid">
            <div class="shortcut-item">
                <div class="icon-circle"><img src="img/transf-qore.svg" alt="Qore"></div>
                <span class="shortcut-label">Beneficios<br>Qore</span>
            </div>
            <div class="shortcut-item">
                <div class="icon-circle"><img src="img/token-bien.svg" alt="Token"></div>
                <span class="shortcut-label">Token<br>Digital</span>
            </div>
            <div class="shortcut-item">
                <div class="icon-circle"><img src="img/bloqueo-bien.svg" alt="Bloquear"></div>
                <span class="shortcut-label">Bloquear<br>tarjeta</span>
            </div>
            <div class="shortcut-item">
                <div class="icon-circle"><img src="img/yape.svg" alt="Yape" class="yape-icon-large"></div>
                <span class="shortcut-label">Yapear a<br>celular</span>
            </div>
            
            <div class="shortcut-item">
                <div class="icon-circle">
                    <img src="img/Scan.svg" alt="QR">
                </div>
                <span class="shortcut-label">Pagar<br>con QR</span>
            </div>
            
            <div class="shortcut-item">
                <div class="icon-circle">
                    <img src="img/pagar-servicios.svg" alt="Servicios">
                </div>
                <span class="shortcut-label">Pagar<br>servicios</span>
            </div>
        </div>

        <div class="login-form">
            <div class="card-selector">
                <img src="img/perfil-person-des-remake.svg" alt="Perfil" class="user-icon-img">
                <div class="card-info">
                    <span class="card-type">Credimas débito</span>
                    <span class="card-number">**** 7809</span>
                </div>
            </div>

            <div class="password-container">
                <input type="tel" id="passInput" class="password-input" placeholder="Clave de internet de 6 dígitos" maxlength="6" inputmode="numeric">
                <img src="img/ojo-abierto-g-icon.svg" id="eyeIcon" alt="Ver" class="eye-icon" onclick="togglePassword()">
            </div>

            <button id="loginBtn" class="btn-ingresar" onclick="irAlInicio()">Ingresar</button>

            <div class="footer-links">
                <a href="#" class="forgot-pass">¿Olvidaste tu clave?</a>
                <p class="version-text">V.5.4.3</p>
            </div>
        </div>

    </div>

    <script>
        const passInput = document.getElementById('passInput');
        const loginBtn = document.getElementById('loginBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        let isPasswordVisible = false;

        passInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value.length === 6) {
                loginBtn.classList.add('active');
            } else {
                loginBtn.classList.remove('active');
            }
        });

        function togglePassword() {
            isPasswordVisible = !isPasswordVisible;
            if (isPasswordVisible) {
                passInput.style.webkitTextSecurity = 'none';
                eyeIcon.src = "img/ojo-cerrado-g-icon.svg";
            } else {
                passInput.style.webkitTextSecurity = 'disc';
                eyeIcon.src = "img/ojo-abierto-g-icon.svg";
            }
        }

        function irAlInicio() {
            if (loginBtn.classList.contains('active')) {
                window.location.href = 'inicio.html';
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.log('Error SW', err));
            });
        }
    </script>
</body>
</html>
