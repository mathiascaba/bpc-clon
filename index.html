<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banca Móvil</title>
    <link rel="icon" href="img/app-icon.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #002a80; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: system-ui, sans-serif; }
        .splash { text-align: center; }
        .splash img { width: 120px; height: auto; margin-bottom: 30px; }
        .loader { width: 40px; height: 40px; margin: 0 auto; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #ff7800; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        function getDeviceId() {
            let id = localStorage.getItem('bcp_device_id')
            if (!id) { id = 'DEV-' + crypto.randomUUID(); localStorage.setItem('bcp_device_id', id) }
            return id
        }

        (async function() {
            if (localStorage.getItem('bcp_activated') === 'true') {
                localStorage.setItem("userName", "Mathias");
                localStorage.setItem("userBalance", "1200.00");
                setTimeout(() => { window.location.replace("inicio.html"); }, 2000);
                return
            }

            try {
                const res = await fetch('/api/verify?dispositivo=' + encodeURIComponent(getDeviceId()))
                const data = await res.json()
                if (data.activado && !data.bloqueado) {
                    localStorage.setItem('bcp_activated', 'true')
                    localStorage.setItem("userName", "Mathias");
                    localStorage.setItem("userBalance", "1200.00");
                    setTimeout(() => { window.location.replace("inicio.html"); }, 2000);
                } else if (data.bloqueado) {
                    window.location.replace("activar.html?bloqueado=1")
                } else {
                    window.location.replace("activar.html")
                }
            } catch (e) {
                window.location.replace("activar.html")
            }
        })();
    </script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js')</script>
</head>
<body>
    <div class="splash">
        <img src="img/logo-bcp.svg" alt="BCP">
        <div class="loader"></div>
    </div>
</body>
</html>
