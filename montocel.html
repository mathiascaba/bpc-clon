<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enviar a</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #fff; color: #333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }

        /* --- PANTALLA DE CARGA BLANCA --- */
        #white-loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #002a80;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .loader-container { position: relative; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; }
        .loader-icon { width: 40px; height: 40px; z-index: 2; }
        .spinner-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 4px solid transparent; border-top-color: #ff7800; animation: spin 1s linear infinite; z-index: 1; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* HEADER */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; }
        .header-title { font-size: 20px; color: #444; flex-grow: 1; margin-left: 15px; font-weight: 400; }
        .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; }
        .icon-btn svg { width: 28px; height: 28px; fill: #555; }

        /* CONTENIDO */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .recipient-section { text-align: center; padding: 25px 0; border-bottom: 1px solid #f0f0f0; display: flex; flex-direction: column; align-items: center; }
        .avatar-circle { width: 55px; height: 55px; background-color: #4a90e2; color: white; border-radius: 50%; font-size: 24px; font-weight: 600; display: flex; justify-content: center; align-items: center; margin-bottom: 12px; text-transform: uppercase; }
        .recipient-name-input { font-size: 22px; font-weight: 500; color: #000; margin-bottom: 5px; border: none; text-align: center; width: 90%; outline: none; background: transparent; font-family: inherit; }
        .recipient-name-input::placeholder { color: #aaa; }
        .recipient-account { font-size: 16px; color: #000; margin-bottom: 5px; letter-spacing: 1px; }
        .yape-label { font-size: 15px; color: #888; text-transform: capitalize; }

        .amount-section { padding: 30px 20px; }
        .label-blue { color: #002a80; font-weight: 600; font-size: 16px; margin-bottom: 15px; }
        .currency-toggle { margin-bottom: 15px; }
        .currency-toggle img { height: 36px; width: auto; }
        .input-amount-container { display: flex; align-items: center; margin-bottom: 30px; }
        .currency-symbol { font-size: 54px; color: #002a80; margin-right: 10px; font-weight: 400; }
        .amount-input { border: none; font-size: 54px; color: #ccc; width: 100%; outline: none; font-weight: 300; background: transparent; font-family: inherit; }
        .amount-input.active-color { color: #002a80; }

        .source-section { padding: 0 20px; }
        .source-card { border: 1px solid #eee; border-radius: 10px; padding: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .source-info strong { display: block; font-size: 16px; color: #000; margin-bottom: 4px; }
        .source-info span { font-size: 15px; color: #666; }
        .source-balance { font-size: 18px; font-weight: 600; color: #000; }

        /* BOTON SIGUIENTE FIJO - MODIFICADO */
        .footer-container { 
            position: absolute;
            bottom: max(50px, env(safe-area-inset-bottom) + 40px); /* Subido para no estorbar en la navegación */
            left: 0;
            right: 0;
            padding: 0 20px; 
            text-align: center; 
        }
        .btn-siguiente { width: 100%; background-color: #d8d8d8; color: white; border: none; border-radius: 35px; padding: 18px 0; font-size: 20px; font-weight: 500; cursor: default; transition: background-color 0.3s; }
        .btn-siguiente.active { background-color: #ff7800; cursor: pointer; }
    </style>
</head>
<body>

    <div id="white-loader-screen">
        <div class="loader-container">
            <div class="spinner-ring"></div>
            <img src="img/lg_favicon_white.svg" alt="Cargando" class="loader-icon">
        </div>
    </div>

    <header class="header">
        <button class="icon-btn" onclick="window.history.back()">
            <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
        </button>
        <div class="header-title">Enviar a</div>
        <button class="icon-btn" onclick="window.location.href='inicio.html'">
            <svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
        </button>
    </header>

    <div id="main-content">
        <div class="recipient-section">
            <div class="avatar-circle" id="avatarInitial"></div>
            <input type="text" class="recipient-name-input" id="destNameInput" value="" placeholder="Ingresa nombre">
            <div class="recipient-account" id="maskedNumber">*** **0 000</div>
            
            <div class="yape-label" id="entidadDestinoLabel">Yape</div>
        </div>

        <div class="amount-section">
            <div class="label-blue">Moneda y monto</div>
            <div class="currency-toggle"><img src="img/tipo-moneda.svg" alt="Soles/Dólares"></div>
            <div class="input-amount-container">
                <span class="currency-symbol">S/</span>
                <input type="tel" id="amountInput" class="amount-input" placeholder="0.00">
            </div>
        </div>

        <div class="source-section">
            <div class="label-blue">Desde</div>
            <div class="source-card">
                <div class="source-info"><strong>Cuenta Digital Soles</strong><span>7809</span></div>
                <div class="source-balance" id="myBalanceDisplay">S/ 0.00</div>
            </div>
        </div>
    </div>

    <div class="footer-container">
        <button id="btnNext" class="btn-siguiente">Siguiente</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // 1. CARGA (LOADING)
            function ocultarCarga() {
                document.getElementById('white-loader-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('white-loader-screen').style.display = 'none';
                    document.getElementById('main-content').style.opacity = '1';
                }, 500);
            }

            // 2. Mostrar la entidad seleccionada
            const entidadGuardada = localStorage.getItem('v_entidad_destino') || 'Yape';
            document.getElementById('entidadDestinoLabel').innerText = entidadGuardada;

            // 3. Saldo dinámico
            const savedBalance = localStorage.getItem("userBalance");
            let saldoMostrar = "1,200.00";
            if (savedBalance) {
                 const val = parseFloat(savedBalance);
                 if (!isNaN(val)) saldoMostrar = val.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                 else saldoMostrar = savedBalance;
            }
            document.getElementById('myBalanceDisplay').innerText = "S/ " + saldoMostrar;

            // 4. Número enmascarado
            const celularFull = localStorage.getItem('v_celular_destino') || "000000000";
            let numeroFormateado = "*** **0 000";
            if (celularFull.length === 9) {
                const last4 = celularFull.slice(-4);
                numeroFormateado = `*** **${last4.charAt(0)} ${last4.slice(1)}`;
            }
            document.getElementById('maskedNumber').innerText = numeroFormateado;

            // 5. Nombre y Avatar
            const nameInput = document.getElementById('destNameInput');
            const avatar = document.getElementById('avatarInitial');
            
            function updateAvatar() {
                const val = nameInput.value.trim();
                avatar.innerText = val.length > 0 ? val.charAt(0).toUpperCase() : "";
            }

            ocultarCarga();
            updateAvatar();
            nameInput.addEventListener('input', updateAvatar);

            // 6. Monto y Botón (MODIFICADO PARA AUTO-DECIMALES)
            const amountInput = document.getElementById('amountInput');
            const btn = document.getElementById('btnNext');

            amountInput.addEventListener('input', function(e) {
                // Eliminar todo lo que no sea número
                let rawValue = this.value.replace(/[^0-9]/g, '');
                
                if (rawValue === '') {
                    this.value = '';
                    btn.classList.remove('active');
                    this.classList.remove('active-color');
                    return;
                }

                // Convertir a decimal automático
                let floatValue = parseFloat(rawValue) / 100;
                this.value = floatValue.toFixed(2);

                if (floatValue > 0) {
                    btn.classList.add('active');
                    this.classList.add('active-color');
                } else {
                    btn.classList.remove('active');
                    this.classList.remove('active-color');
                }
            });
            
            // 7. CLICK EN SIGUIENTE
            btn.addEventListener('click', function() {
                if (this.classList.contains('active')) {
                   localStorage.setItem('v_nombre_yape', nameInput.value);
                   localStorage.setItem('v_monto_yape', amountInput.value);
                   
                   localStorage.setItem('v_entidad_real', entidadGuardada);
                   
                   const loader = document.getElementById('white-loader-screen');
                   loader.style.opacity = '1';
                   loader.style.display = 'flex';
                   setTimeout(function() {
                       window.location.href = 'confirmar_yape.html';
                   }, 3000);
                }
            });
        });
    </script>
</body>
</html>
